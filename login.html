<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>로그인 - 학교생활+</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <style>
        body {
            background-color: #f8f9fa;
            color: #202124;
            -webkit-font-smoothing: antialiased;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-100">
        <div class="flex justify-between items-center h-16 w-full px-6 max-w-7xl mx-auto">
            <div class="flex items-center cursor-pointer" onclick="location.href='index.html'">
                <div class="flex flex-col items-start justify-center">
                    <h1 class="text-lg font-medium text-gray-800 tracking-tight leading-none" style="font-family: 'Plus Jakarta Sans', sans-serif;">
                        <span class="text-gray-500 font-normal mr-1">대영고등학교</span>학교생활<span class="text-[#1a73e8]">+</span>
                    </h1>
                    <span class="text-[10px] text-gray-400 mt-1 tracking-wider" style="font-family: 'Inter', sans-serif;">by DY365</span>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 pt-16">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 p-8 sm:p-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-2" style="font-family: 'Plus Jakarta Sans', sans-serif;">로그인</h2>
                <p class="text-gray-500 text-sm">학교생활+ 서비스에 오신 것을 환영합니다.</p>
            </div>
            
            <form onsubmit="handleLogin(event)" class="space-y-5">
                <div>
                    <label for="userId" class="block text-sm font-medium text-gray-700 mb-1.5">아이디</label>
                    <input type="text" id="userId" required class="w-full h-[48px] px-4 rounded-xl border border-gray-200 focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] outline-none transition-all placeholder:text-gray-400" placeholder="학번 또는 교직원 ID">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호</label>
                    <input type="password" id="password" required class="w-full h-[48px] px-4 rounded-xl border border-gray-200 focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] outline-none transition-all placeholder:text-gray-400" placeholder="비밀번호를 입력하세요">
                </div>
                
                <button type="submit" class="w-full h-[48px] mt-2 bg-[#1a73e8] hover:bg-[#1557b0] text-white font-semibold rounded-xl transition-colors duration-200 active:scale-[0.98]">
                    로그인
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500">
                    아직 계정이 없나요? 
                    <a href="signup.html" class="font-medium text-[#1a73e8] hover:text-[#1557b0] hover:underline ml-1 transition-colors">회원가입</a>
                </p>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="bg-transparent mt-auto py-6">
        <div class="text-center text-[13px] text-gray-500">
            © 2026 대영고등학교 | Developed by 이순옥
        </div>
    </footer>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            // 데모용으로 로그인 시 바로 index.html로 이동
            location.href = 'index.html';
        }
    </script>
</body>
</html>
