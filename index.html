<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>학교생활+</title>
    <!-- Google Fonts: Plus Jakarta Sans & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #ffffff;
            color: #202124; /* Google dark gray */
            -webkit-font-smoothing: antialiased;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        /* Minimal scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        
        /* Thin underline animation for nav */
        .nav-link {
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #1a73e8; /* Google Blue */
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.2s ease;
        }
        .nav-link:hover::after, .nav-item:hover .nav-link::after, .nav-link.active::after {
            transform: scaleX(1);
        }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            line-height: 1.6;
        }
        .markdown-body h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; color: #202124; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #202124; }
        .markdown-body p { margin-bottom: 1rem; color: #5f6368; }
        .markdown-body ul, .markdown-body ol { margin-left: 1.5rem; margin-bottom: 1rem; color: #5f6368; list-style-type: disc; }
        .markdown-body li { margin-bottom: 0.25rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-100">
        <div class="flex justify-between items-center h-16 w-full px-6 max-w-7xl mx-auto">
            <div class="flex items-center">
                <h1 class="text-lg font-medium text-gray-800 tracking-tight" style="font-family: 'Plus Jakarta Sans', sans-serif;">
                    <span class="text-gray-500 font-normal mr-1">○○고등학교</span>학교생활<span class="text-blue-600">+</span>
                </h1>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 rounded-full hover:bg-gray-100 transition-colors text-gray-500">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <button class="p-2 rounded-full hover:bg-gray-100 transition-colors text-gray-500">
                    <span class="material-symbols-outlined">account_circle</span>
                </button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-start px-4 pt-[20vh]">
        <div class="w-full max-w-[600px] text-center">
            
            <!-- Branding -->
            <div class="mb-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
                <p class="text-lg font-medium text-gray-500 mb-1 tracking-wider">○○고등학교</p>
                <h2 class="text-[52px] font-bold text-[#202124] tracking-tight leading-none" style="font-family: 'Plus Jakarta Sans', sans-serif;">학교생활<span class="text-[#1a73e8]">+</span></h2>
            </div>
            
            <!-- Search Bar -->
            <div class="relative w-full mx-auto max-w-[584px] mb-8 animate-in fade-in slide-in-from-bottom-6 duration-700 delay-100">
                <div class="flex items-center w-full h-[56px] bg-white border border-[#dfe1e5] rounded-[28px] px-4 transition-shadow duration-200 hover:shadow-[0_1px_6px_rgba(32,33,36,0.28)] focus-within:shadow-[0_1px_6px_rgba(32,33,36,0.28)] focus-within:border-transparent">
                    <span class="material-symbols-outlined text-[#9aa0a6] mr-3">search</span>
                    <input class="flex-grow bg-transparent border-none focus:ring-0 text-[16px] text-[#202124] placeholder:text-[#9aa0a6] outline-none w-full" placeholder="필요한 서비스를 검색하세요." type="text">
                </div>
            </div>
            
            <!-- Navigation -->
            <nav class="flex justify-center items-center gap-8 animate-in fade-in slide-in-from-bottom-8 duration-700 delay-200">
                <!-- 교과 Menu -->
                <div class="relative group nav-item">
                    <a class="nav-link nav-tab px-1 pb-1 text-[15px] font-medium text-[#5f6368] hover:text-[#202124] transition-colors duration-200 inline-block cursor-pointer" href="#">교과</a>
                    <div class="absolute left-1/2 -translate-x-1/2 mt-2 w-32 bg-white border border-gray-100 rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 flex flex-col py-2">
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043]">국어</a>
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043]">수학</a>
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043]">영어</a>
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043]">사회</a>
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043]">과학</a>
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043]">예체능</a>
                    </div>
                </div>

                <!-- 학년 Menu -->
                <div class="relative group nav-item">
                    <a class="nav-link nav-tab active px-1 pb-1 text-[15px] font-medium text-[#202124] transition-colors duration-200 inline-block cursor-pointer" href="#">학년</a>
                    <div class="absolute left-1/2 -translate-x-1/2 mt-2 w-32 bg-white border border-gray-100 rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 flex flex-col py-2">
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043]">1학년</a>
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043]">2학년</a>
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043]">3학년</a>
                    </div>
                </div>

                <!-- 진로 Menu -->
                <div class="relative group nav-item">
                    <a class="nav-link nav-tab px-1 pb-1 text-[15px] font-medium text-[#5f6368] hover:text-[#202124] transition-colors duration-200 inline-block cursor-pointer" href="#">진로</a>
                </div>

                <!-- 학교생활 Menu -->
                <div class="relative group nav-item">
                    <a class="nav-link nav-tab px-1 pb-1 text-[15px] font-medium text-[#5f6368] hover:text-[#202124] transition-colors duration-200 inline-block cursor-pointer" href="#">학교생활</a>
                    <div class="absolute left-1/2 -translate-x-1/2 mt-2 w-36 bg-white border border-gray-100 rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 flex flex-col py-2">
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043] whitespace-nowrap">wee클래스</a>
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043] whitespace-nowrap">꿈마루도서관</a>
                        <a href="#" class="px-4 py-2 hover:bg-gray-50 text-[14px] text-[#3c4043] whitespace-nowrap">보건실</a>
                    </div>
                </div>
            </nav>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="bg-[#f8f9fa] border-t border-[#dadce0]">
        <div class="flex flex-col md:flex-row justify-between items-center py-4 px-6 w-full max-w-7xl mx-auto text-[13px] text-[#70757a]">
            <div class="flex items-center gap-4 mb-3 md:mb-0">
                <span>© 2026 ○○고등학교. All rights reserved.</span>
            </div>
            <div class="flex gap-6">
                <button onclick="openModal('terms')" class="hover:text-[#3c4043] transition-colors">이용약관</button>
                <button onclick="openModal('privacy')" class="hover:text-[#3c4043] transition-colors">개인정보처리방침</button>
                <button class="hover:text-[#3c4043] transition-colors">문의하기</button>
                <button class="hover:text-[#3c4043] transition-colors">시스템관리</button>
            </div>
        </div>
    </footer>

    <!-- Modal Template -->
    <div id="document-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" class="text-xl font-bold text-gray-800">문서</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body markdown-body" id="modal-body-content">
                <!-- Content will be injected here -->
            </div>
        </div>
    </div>
    
    <script>
        // Modal Logic
        const overlay = document.getElementById('document-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body-content');

        overlay.addEventListener('click', (e) => {
            if(e.target === overlay) closeModal();
        });

        async function openModal(docType) {
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            modalBody.innerHTML = '<div class="text-center py-8 text-gray-500">로딩 중...</div>';
            
            try {
                let fileToLoad = docType === 'terms' ? 'terms.md' : 'privacy.md';
                let title = docType === 'terms' ? '이용약관' : '개인정보처리방침';
                
                modalTitle.innerText = title;
                
                const response = await fetch(fileToLoad);
                if(!response.ok) throw new Error('파일을 불러오는데 실패했습니다.');
                
                const text = await response.text();
                modalBody.innerHTML = marked.parse(text);
            } catch (error) {
                modalBody.innerHTML = '<div class="text-red-500">문서를 불러오는 중 오류가 발생했습니다. (' + error.message + ')</div>';
            }
        }

        function closeModal() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Tab switching logic (Visual only)
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.nav-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    e.preventDefault();
                    tabs.forEach(t => {
                        t.classList.remove('active', 'text-[#202124]');
                        t.classList.add('text-[#5f6368]');
                    });
                    tab.classList.remove('text-[#5f6368]');
                    tab.classList.add('active', 'text-[#202124]');
                });
            });
        });
    </script>
</body>
</html>
