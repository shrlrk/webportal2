<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>학교생활+</title>
    <!-- Google Fonts: Plus Jakarta Sans & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #ffffff;
            color: #202124;
            -webkit-font-smoothing: antialiased;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            line-height: 1.6;
        }
        .markdown-body h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; color: #202124; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #202124; }
        .markdown-body p { margin-bottom: 1rem; color: #5f6368; }
        .markdown-body ul, .markdown-body ol { margin-left: 1.5rem; margin-bottom: 1rem; color: #5f6368; list-style-type: disc; }
        .markdown-body li { margin-bottom: 0.25rem; }

        /* Animation for submenus */
        .fade-enter {
            opacity: 0;
            transform: translateY(-5px);
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 300ms, transform 300ms;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-100">
        <div class="flex justify-between items-center h-16 w-full px-6 max-w-7xl mx-auto">
            <div class="flex items-center">
                <div class="flex flex-col items-center justify-center">
                    <h1 class="text-lg font-medium text-gray-800 tracking-tight leading-none" style="font-family: 'Plus Jakarta Sans', sans-serif;">
                        <span class="text-gray-500 font-normal mr-1">○○고등학교</span>학교생활<span class="text-[#1a73e8]">+</span>
                    </h1>
                    <span class="text-[10px] text-gray-400 mt-1 tracking-wider" style="font-family: 'Inter', sans-serif;">by DY365</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 rounded-full hover:bg-gray-100 transition-colors text-gray-500">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <button class="p-2 rounded-full hover:bg-gray-100 transition-colors text-gray-500">
                    <span class="material-symbols-outlined">account_circle</span>
                </button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-start px-4 pt-[20vh]">
        <div class="w-full max-w-[600px] text-center">
            
            <!-- Branding -->
            <div class="mb-10 animate-in fade-in slide-in-from-bottom-4 duration-700 flex flex-col items-center">
                <p class="text-[16px] font-medium text-gray-500 mb-2 tracking-wider">○○고등학교</p>
                <div class="flex flex-col items-center justify-center">
                    <h2 class="text-[52px] font-bold text-[#202124] tracking-tight leading-none" style="font-family: 'Plus Jakarta Sans', sans-serif;">학교생활<span class="text-[#1a73e8]">+</span></h2>
                    <span class="text-sm font-medium text-gray-400 mt-2 tracking-widest" style="font-family: 'Inter', sans-serif;">by DY365</span>
                </div>
            </div>
            
            <!-- Search Bar -->
            <div class="relative w-full mx-auto max-w-[584px] mb-10 animate-in fade-in slide-in-from-bottom-6 duration-700 delay-100">
                <div class="flex items-center w-full h-[56px] bg-white border border-[#dfe1e5] rounded-[28px] px-4 transition-shadow duration-200 hover:shadow-[0_1px_6px_rgba(32,33,36,0.28)] focus-within:shadow-[0_1px_6px_rgba(32,33,36,0.28)] focus-within:border-transparent">
                    <span class="material-symbols-outlined text-[#9aa0a6] mr-3">search</span>
                    <input class="flex-grow bg-transparent border-none focus:ring-0 text-[16px] text-[#202124] placeholder:text-[#9aa0a6] outline-none w-full" placeholder="필요한 서비스를 검색하세요." type="text">
                </div>
            </div>
            
            <!-- Primary Navigation (1차 메뉴) -->
            <nav class="flex justify-center items-center gap-8 mb-6 animate-in fade-in slide-in-from-bottom-8 duration-700 delay-200">
                <div class="relative cursor-pointer group" onclick="switchTab('tab-subject', this)">
                    <span class="nav-tab text-[21px] font-medium text-[#1a73e8] transition-colors duration-200 pb-1 inline-block">교과</span>
                    <div class="nav-indicator absolute bottom-[-4px] left-0 w-full h-[2px] bg-[#1a73e8] scale-x-100 transition-transform duration-300"></div>
                </div>
                
                <div class="h-5 w-[1px] bg-gray-200"></div>

                <div class="relative cursor-pointer group" onclick="switchTab('tab-grade', this)">
                    <span class="nav-tab text-[21px] font-medium text-[#5f6368] group-hover:text-[#202124] transition-colors duration-200 pb-1 inline-block">학년</span>
                    <div class="nav-indicator absolute bottom-[-4px] left-0 w-full h-[2px] bg-[#1a73e8] scale-x-0 transition-transform duration-300"></div>
                </div>

                <div class="h-5 w-[1px] bg-gray-200"></div>

                <div class="relative cursor-pointer group" onclick="switchTab('tab-career', this)">
                    <span class="nav-tab text-[21px] font-medium text-[#5f6368] group-hover:text-[#202124] transition-colors duration-200 pb-1 inline-block">진로</span>
                    <div class="nav-indicator absolute bottom-[-4px] left-0 w-full h-[2px] bg-[#1a73e8] scale-x-0 transition-transform duration-300"></div>
                </div>

                <div class="h-5 w-[1px] bg-gray-200"></div>

                <div class="relative cursor-pointer group" onclick="switchTab('tab-life', this)">
                    <span class="nav-tab text-[21px] font-medium text-[#5f6368] group-hover:text-[#202124] transition-colors duration-200 pb-1 inline-block">학교생활</span>
                    <div class="nav-indicator absolute bottom-[-4px] left-0 w-full h-[2px] bg-[#1a73e8] scale-x-0 transition-transform duration-300"></div>
                </div>
            </nav>

            <!-- Secondary Navigation (2차 메뉴) -->
            <div class="min-h-[120px] animate-in fade-in slide-in-from-bottom-8 duration-700 delay-300">
                <!-- 교과 (Subject) -->
                <div id="tab-subject" class="submenu-container grid grid-cols-3 gap-3 max-w-[400px] mx-auto fade-enter-active">
                    <button class="sub-btn border-[#d2e3fc] bg-[#e8f0fe] text-[#1a73e8] py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">국어</button>
                    <button class="sub-btn border-gray-200 bg-white text-gray-700 hover:bg-gray-50 py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">영어</button>
                    <button class="sub-btn border-gray-200 bg-white text-gray-700 hover:bg-gray-50 py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">수학</button>
                    <button class="sub-btn border-gray-200 bg-white text-gray-700 hover:bg-gray-50 py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">사회</button>
                    <button class="sub-btn border-gray-200 bg-white text-gray-700 hover:bg-gray-50 py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">과학</button>
                    <button class="sub-btn border-gray-200 bg-white text-gray-700 hover:bg-gray-50 py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">예체능</button>
                </div>
                
                <!-- 학년 (Grade) -->
                <div id="tab-grade" class="submenu-container hidden grid-cols-3 gap-3 max-w-[320px] mx-auto">
                    <button class="sub-btn border-[#d2e3fc] bg-[#e8f0fe] text-[#1a73e8] py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">1학년</button>
                    <button class="sub-btn border-gray-200 bg-white text-gray-700 hover:bg-gray-50 py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">2학년</button>
                    <button class="sub-btn border-gray-200 bg-white text-gray-700 hover:bg-gray-50 py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">3학년</button>
                </div>

                <!-- 진로 (Career) -->
                <div id="tab-career" class="submenu-container hidden flex justify-center gap-3 max-w-[400px] mx-auto">
                    <p class="text-gray-500 mt-4">진로 관련 하위 메뉴가 없습니다.</p>
                </div>

                <!-- 학교생활 (School Life) -->
                <div id="tab-life" class="submenu-container hidden grid-cols-3 gap-3 max-w-[420px] mx-auto">
                    <button class="sub-btn border-[#d2e3fc] bg-[#e8f0fe] text-[#1a73e8] py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">꿈마루도서관</button>
                    <button class="sub-btn border-gray-200 bg-white text-gray-700 hover:bg-gray-50 py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">Wee클래스</button>
                    <button class="sub-btn border-gray-200 bg-white text-gray-700 hover:bg-gray-50 py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200">보건실</button>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="bg-[#f8f9fa] border-t border-[#dadce0]">
        <div class="flex flex-col md:flex-row justify-between items-center py-4 px-6 w-full max-w-7xl mx-auto text-[13px] text-[#70757a]">
            <div class="flex items-center gap-4 mb-3 md:mb-0">
                <span>© 2026 ○○고등학교. All rights reserved.</span>
            </div>
            <div class="flex gap-6">
                <button onclick="openModal('terms')" class="hover:text-[#3c4043] transition-colors">이용약관</button>
                <button onclick="openModal('privacy')" class="hover:text-[#3c4043] transition-colors">개인정보처리방침</button>
                <button class="hover:text-[#3c4043] transition-colors">문의하기</button>
                <button class="hover:text-[#3c4043] transition-colors">시스템관리</button>
            </div>
        </div>
    </footer>

    <!-- Modal Template -->
    <div id="document-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" class="text-xl font-bold text-gray-800">문서</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body markdown-body" id="modal-body-content">
                <!-- Content will be injected here -->
            </div>
        </div>
    </div>
    
    <script>
        // Modal Logic
        const overlay = document.getElementById('document-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body-content');

        overlay.addEventListener('click', (e) => {
            if(e.target === overlay) closeModal();
        });

        async function openModal(docType) {
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            modalBody.innerHTML = '<div class="text-center py-8 text-gray-500">로딩 중...</div>';
            
            try {
                let fileToLoad = docType === 'terms' ? 'terms.md' : 'privacy.md';
                let title = docType === 'terms' ? '이용약관' : '개인정보처리방침';
                modalTitle.innerText = title;
                
                const response = await fetch(fileToLoad);
                if(!response.ok) throw new Error('파일을 불러오는데 실패했습니다.');
                
                const text = await response.text();
                modalBody.innerHTML = marked.parse(text);
            } catch (error) {
                modalBody.innerHTML = '<div class="text-red-500">문서를 불러오는 중 오류가 발생했습니다. (' + error.message + ')</div>';
            }
        }

        function closeModal() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Tab Switching Logic
        function switchTab(tabId, el) {
            // Reset primary nav styling
            document.querySelectorAll('.nav-tab').forEach(t => {
                t.classList.remove('text-[#1a73e8]');
                t.classList.add('text-[#5f6368]');
            });
            document.querySelectorAll('.nav-indicator').forEach(i => {
                i.classList.remove('scale-x-100');
                i.classList.add('scale-x-0');
            });
            
            // Set active primary nav
            const textSpan = el.querySelector('.nav-tab');
            const indicator = el.querySelector('.nav-indicator');
            textSpan.classList.remove('text-[#5f6368]');
            textSpan.classList.add('text-[#1a73e8]');
            indicator.classList.remove('scale-x-0');
            indicator.classList.add('scale-x-100');

            // Hide all submenus
            document.querySelectorAll('.submenu-container').forEach(c => {
                c.classList.add('hidden');
                c.classList.remove('grid', 'fade-enter', 'fade-enter-active');
            });

            // Show selected submenu with animation
            const target = document.getElementById(tabId);
            if (target) {
                target.classList.remove('hidden');
                if (tabId === 'tab-career') {
                    target.classList.add('flex', 'fade-enter');
                } else {
                    target.classList.add('grid', 'fade-enter');
                }
                
                // Trigger reflow to restart animation
                void target.offsetWidth;
                target.classList.add('fade-enter-active');
                target.classList.remove('fade-enter');
            }
        }

        // Submenu button selection logic
        document.querySelectorAll('.sub-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const siblings = btn.parentElement.querySelectorAll('.sub-btn');
                siblings.forEach(s => {
                    s.className = 'sub-btn border-gray-200 bg-white text-gray-700 hover:bg-gray-50 py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200';
                });
                btn.className = 'sub-btn border-[#d2e3fc] bg-[#e8f0fe] text-[#1a73e8] py-2.5 px-4 rounded-full border text-[15px] font-medium transition-colors duration-200';
            });
        });
    </script>
</body>
</html>
