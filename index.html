<!DOCTYPE html>
<html class="light" lang="ko" style="">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>우리학교 Web Portal</title>
    <!-- Google Fonts: Plus Jakarta Sans & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#5e6572",
                        "secondary-container": "#dce2f3",
                        "tertiary": "#525557",
                        "error": "#ba1a1a",
                        "primary-container": "#2563eb",
                        "on-secondary-fixed": "#151c27",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-primary-container": "#eeefff",
                        "surface-container-highest": "#dce2f7",
                        "tertiary-fixed-dim": "#c5c7c8",
                        "on-tertiary-container": "#eff0f2",
                        "surface-dim": "#d3daef",
                        "on-background": "#141b2b",
                        "primary-fixed": "#dbe1ff",
                        "outline": "#737686",
                        "primary": "#004ac6",
                        "on-primary-fixed": "#00174b",
                        "tertiary-container": "#6b6d6f",
                        "on-tertiary-fixed": "#191c1e",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-high": "#e1e8fd",
                        "background": "#f9f9ff",
                        "on-secondary-fixed-variant": "#404754",
                        "secondary-fixed-dim": "#c0c7d6",
                        "surface-variant": "#dce2f7",
                        "on-primary": "#ffffff",
                        "surface-tint": "#0053db",
                        "inverse-surface": "#293040",
                        "on-surface": "#141b2b",
                        "on-error": "#ffffff",
                        "surface-container": "#e9edff",
                        "inverse-on-surface": "#edf0ff",
                        "tertiary-fixed": "#e1e2e4",
                        "secondary": "#585f6c",
                        "outline-variant": "#c3c6d7",
                        "secondary-fixed": "#dce2f3",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f1f3ff",
                        "surface": "#f9f9ff",
                        "inverse-primary": "#b4c5ff",
                        "surface-bright": "#f9f9ff",
                        "on-surface-variant": "#434655",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "80px",
                        "container-max": "1100px",
                        "base": "4px",
                        "gutter": "24px",
                        "md": "24px",
                        "sm": "16px",
                        "xs": "8px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.03em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #ffffff;
            color: #141b2b;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .search-focus-ring:focus-within {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        /* Custom scrollbar for minimalist look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md">
    <!-- TopNavBar - Execution of JSON styles -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-surface dark:bg-surface border-b border-outline-variant dark:border-outline">
        <div class="flex justify-between items-center h-16 w-full px-gutter max-w-container-max mx-auto">
            <div class="flex items-center gap-xs">
                <!-- School Logo Minimalist -->
                <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-on-primary">
                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">school</span>
                </div>
                <h1 class="text-headline-lg font-headline-lg font-bold text-on-surface dark:text-on-surface">우리학교</h1>
            </div>
            <!-- Trailing Icons -->
            <div class="flex items-center gap-md">
                <button class="p-2 rounded-full hover:bg-surface-container-low transition-colors duration-200">
                    <span class="material-symbols-outlined text-on-surface-variant">notifications</span>
                </button>
                <button class="p-2 rounded-full hover:bg-surface-container-low transition-colors duration-200">
                    <span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
                </button>
            </div>
        </div>
    </header>
    
    <!-- Main Content: Centered Layout Inspired by Search Engines -->
    <main class="flex-grow flex flex-col items-center justify-center px-gutter pt-16">
        <div class="w-full max-w-[640px] text-center space-y-xl">
            <!-- Branding Section -->
            <div class="space-y-sm animate-in fade-in slide-in-from-bottom-4 duration-700">
                <div class="inline-flex items-center justify-center w-24 h-24 rounded-[24px] border border-outline-variant mb-md bg-surface-container-lowest">
                    <span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">architecture</span>
                </div>
                <h2 class="font-display-lg text-[48px] tracking-tight text-on-surface">우리학교 Web Portal</h2>
                <p class="font-headline-md text-headline-md text-on-surface-variant opacity-70">모든 학습 정보를 한눈에, 스마트한 학교 생활의 시작</p>
            </div>
            
            <!-- Central Search Bar Component -->
            <div class="relative w-full group animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-200">
                <div class="search-focus-ring flex items-center w-full h-24 border border-outline-variant rounded-full px-8 transition-all duration-300 bg-[#F8F9FB]">
                    <span class="material-symbols-outlined text-outline mr-4">search</span>
                    <input class="flex-grow bg-transparent border-none focus:ring-0 text-headline-md font-headline-md text-on-surface placeholder:text-outline" placeholder="궁금한 정보를 검색해보세요" type="text">
                    <div class="flex items-center gap-sm">
                        <kbd class="hidden md:inline-flex items-center h-6 px-1.5 rounded border border-outline-variant bg-surface-container-lowest text-[10px] font-medium text-outline">⌘K</kbd>
                        <button class="material-symbols-outlined text-primary hover:scale-110 transition-transform">mic</button>
                    </div>
                </div>
            </div>
            
            <!-- Navigation Tabs - Shared Component Mapping -->
            <nav class="flex justify-center items-center gap-lg animate-in fade-in slide-in-from-bottom-12 duration-1000 delay-500">
                <a class="group relative px-2 pb-1 font-headline-md transition-all duration-200 scale-98 active:scale-95 text-on-surface-variant text-headline-md" href="#">교과</a>
                <a class="px-2 pb-1 font-headline-md hover:text-primary transition-colors duration-200 scale-98 active:scale-95 text-primary border-b-2 border-primary text-headline-md" href="#">학년</a>
                <a class="px-2 pb-1 font-headline-md hover:text-primary transition-colors duration-200 scale-98 active:scale-95 text-on-surface-variant text-headline-md" href="#">진로</a>
                <a class="px-2 pb-1 font-headline-md text-on-surface-variant hover:text-primary transition-colors duration-200 scale-98 active:scale-95 text-headline-md" href="#">학교생활</a>
            </nav>
        </div>
    </main>
    
    <!-- Footer - Execution of JSON styles -->
    <footer class="bg-surface dark:bg-surface border-t border-outline-variant dark:border-outline">
        <div class="flex flex-col md:flex-row justify-between items-center py-lg px-gutter w-full max-w-container-max mx-auto">
            <div class="flex items-center gap-md order-2 md:order-1 mt-md md:mt-0">
                <span class="text-label-md font-headline-md text-on-surface-variant text-body-lg">우리학교</span>
                <span class="font-label-sm text-label-sm text-on-secondary-container opacity-60 text-label-md">© 2024 우리학교. All rights reserved.</span>
            </div>
            <div class="flex gap-lg order-1 md:order-2">
                <a class="font-label-sm text-label-sm text-on-secondary-container dark:text-on-secondary-fixed-variant hover:text-primary underline transition-all opacity-80 hover:opacity-100 text-label-md" href="#">Terms</a>
                <a class="font-label-sm text-label-sm text-on-secondary-container dark:text-on-secondary-fixed-variant hover:text-primary underline transition-all opacity-80 hover:opacity-100 text-label-md" href="#">Privacy</a>
                <a class="font-label-sm text-label-sm text-on-secondary-container dark:text-on-secondary-fixed-variant hover:text-primary underline transition-all opacity-80 hover:opacity-100 text-label-md" href="#">Manager</a>
            </div>
        </div>
    </footer>
    
    <!-- Micro-interaction Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.querySelector('input');
            const searchContainer = input.parentElement;

            input.addEventListener('focus', () => {
                searchContainer.classList.add('bg-white');
                searchContainer.classList.remove('bg-[#F8F9FB]');
            });

            input.addEventListener('blur', () => {
                searchContainer.classList.remove('bg-white');
                searchContainer.classList.add('bg-[#F8F9FB]');
            });

            // Tab switching logic (Visual only)
            const tabs = document.querySelectorAll('nav a');
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    e.preventDefault();
                    tabs.forEach(t => {
                        t.classList.remove('text-primary', 'border-b-2', 'border-primary');
                        t.classList.add('text-on-surface-variant');
                    });
                    tab.classList.remove('text-on-surface-variant');
                    tab.classList.add('text-primary', 'border-b-2', 'border-primary');
                });
            });

            // Keyboard shortcut placeholder
            document.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                    e.preventDefault();
                    input.focus();
                }
            });
        });
    </script>
</body>
</html>
